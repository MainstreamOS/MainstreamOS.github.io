<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 200 200" aria-hidden="true">
  <defs>
    <linearGradient id="streamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#009ca5"/>
      <stop offset="100%" stop-color="#008dc3"/>
